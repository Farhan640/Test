<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kris Registration Form</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh; /* Full viewport height */
            font-family: Arial, sans-serif;
            background-color: #f0f0f0; /* Light background for contrast */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.8); /* Dark transparent background */
            color: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .cta {
            text-align: center;
        }
        .cta a {
            background-color: #008080;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            margin: 10px 0;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .cta a:hover {
            background-color: #006666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kris Registration Form</h1>
    
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdblc04H2GYU2qujleFfgwjAkHLok0RqE7RRGxSl_gOBDwE1g/viewform?embedded=true" width="420" height="500" frameborder="0" marginheight="0" marginwidth="0">Memuatkan…</iframe>

    <div class="cta">
        <a href="index.html">Back to Home</a> <!-- Link to Home Page -->
    </div>
</div>

</body>
</html>
